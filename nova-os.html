<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retífica OS | Nova OS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <a class="brand-inline" href="dashboard.html"><span>RO</span> Retífica OS</a>
    <nav class="nav-menu">
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="nova-os.html">Nova OS</a>
      <a href="servicos.html">Serviços</a>
      <a href="clientes.html">Clientes</a>
      <a href="financeiro.html">Financeiro</a>
      <a href="configuracoes.html">Configurações</a>
    </nav>
    <button class="btn btn-ghost logout-button" type="button">Sair</button>
  </aside>

  <main class="app-main">
    <header class="page-header">
      <div>
        <p class="eyebrow">Atendimento</p>
        <h1 id="formTitle">Cadastrar ordem de serviço</h1>
      </div>
    </header>

    <form id="osForm" class="os-form">
      <section class="form-section">
        <div class="form-section-title">
          <span>01</span>
          <h2>Dados do cliente</h2>
        </div>
        <div class="form-grid">
          <label>Número da OS<input id="numeroOs" name="numeroOs" type="text" readonly></label>
          <label>Data de entrada<input id="dataEntrada" name="dataEntrada" type="date" readonly></label>
          <label>Nome do cliente<input name="cliente" type="text" required></label>
          <label>Telefone<input name="telefone" type="tel" placeholder="(00) 00000-0000" required></label>
        </div>
      </section>

      <section class="form-section">
        <div class="form-section-title">
          <span>02</span>
          <h2>Dados do veículo</h2>
        </div>
        <div class="form-grid">
          <label>Carro<input name="carro" type="text" required></label>
          <label>Ano<input name="ano" type="number" min="1900" max="2100"></label>
          <label class="full-width">Motor<input name="motor" type="text"></label>
        </div>
      </section>

      <section class="form-section">
        <div class="form-section-title">
          <span>03</span>
          <h2>Dados da peça</h2>
        </div>
        <div class="form-grid">
          <label>Peça/Cabeçote<input name="peca" type="text" required></label>
          <label>Tipo de serviço<input name="tipoServico" type="text" placeholder="Plainar, solda, teste..." required></label>
        </div>
      </section>

      <section class="form-section">
        <div class="form-section-title">
          <span>04</span>
          <h2>Serviço</h2>
        </div>
        <div class="form-grid">
          <label>Status do serviço
            <select name="statusServico">
              <option value="recebido">Recebido</option>
              <option value="em análise">Em análise</option>
              <option value="em execução">Em execução</option>
              <option value="finalizado">Finalizado</option>
              <option value="entregue">Entregue</option>
            </select>
          </label>
          <label>Previsão de entrega<input name="previsaoEntrega" type="date"></label>
        </div>
      </section>

      <section class="form-section">
        <div class="form-section-title">
          <span>05</span>
          <h2>Pagamento</h2>
        </div>
        <div class="form-grid">
          <label>Valor total<input name="valorTotal" type="number" min="0" step="0.01" required></label>
          <label>Valor de entrada<input name="valorEntrada" type="number" min="0" step="0.01" value="0"></label>
          <label>Valor restante<input id="valorRestante" name="valorRestante" type="text" readonly></label>
          <label>Status do pagamento
            <select name="statusPagamento">
              <option value="pendente">Pendente</option>
              <option value="parcial">Parcial</option>
              <option value="pago">Pago</option>
            </select>
          </label>
        </div>
      </section>

      <section class="form-section">
        <div class="form-section-title">
          <span>06</span>
          <h2>Observações</h2>
        </div>
        <div class="form-grid">
          <label class="full-width">Observações da peça<textarea name="observacoesPeca" rows="3"></textarea></label>
          <label class="full-width">Observações gerais<textarea name="observacoesGerais" rows="3"></textarea></label>
        </div>
      </section>

      <div class="form-actions sticky-actions">
        <button class="btn btn-primary" type="submit" id="submitButton">Salvar ordem</button>
        <a class="btn btn-secondary" href="servicos.html">Ver serviços</a>
      </div>
    </form>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/os.js"></script>
</body>
</html>
