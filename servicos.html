<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retífica OS | Serviços</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <a class="brand-inline" href="dashboard.html"><span>RO</span> Retífica OS</a>
    <nav class="nav-menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="nova-os.html">Nova OS</a>
      <a class="active" href="servicos.html">Serviços</a>
      <a href="clientes.html">Clientes</a>
      <a href="financeiro.html">Financeiro</a>
      <a href="configuracoes.html">Configurações</a>
      <a href="ajuda.html">Ajuda</a>
    </nav>
    <button class="btn btn-ghost logout-button" type="button">Sair</button>
  </aside>

  <main class="app-main">
    <header class="page-header">
      <div>
        <p class="eyebrow">Oficina</p>
        <h1>Ordens de serviço</h1>
      </div>
      <a class="btn btn-primary" href="nova-os.html">Nova OS</a>
    </header>

    <section class="filter-bar services-toolbar">
      <label class="wide-label search-label">Buscar OS, cliente, telefone, carro, peça ou serviço
        <input id="serviceSearch" type="search" placeholder="Digite para localizar uma ordem">
      </label>
      <label>Status do serviço
        <select id="statusFilter">
          <option value="todos">Todos</option>
          <option value="orçamento">Orçamento</option>
          <option value="aguardando aprovação">Aguardando aprovação</option>
          <option value="aprovado">Aprovado</option>
          <option value="recusado">Recusado</option>
          <option value="recebido">Recebido</option>
          <option value="em análise">Em análise</option>
          <option value="em execução">Em execução</option>
          <option value="finalizado">Finalizado</option>
          <option value="entregue">Entregue</option>
          <option value="atrasadas">Atrasadas</option>
        </select>
      </label>
      <label>Pagamento
        <select id="paymentFilter">
          <option value="todos">Todos</option>
          <option value="pendente">Pendente</option>
          <option value="parcial">Parcial</option>
          <option value="pago">Pago</option>
          <option value="sem cobrança">Sem cobrança</option>
        </select>
      </label>
      <label>Ordenar por
        <select id="serviceSort">
          <option value="recentes">Mais recentes</option>
          <option value="antigas">Mais antigas</option>
          <option value="maior-valor">Maior valor</option>
          <option value="maior-pendencia">Maior pendência</option>
          <option value="previsao-proxima">Previsão mais próxima</option>
          <option value="atrasadas-primeiro">Atrasadas primeiro</option>
          <option value="os-crescente">Número da OS crescente</option>
          <option value="os-decrescente">Número da OS decrescente</option>
        </select>
      </label>
      <div class="quick-filter-row" aria-label="Filtros rápidos">
        <button class="quick-filter-chip" type="button" data-quick-filter="aberto">Em aberto</button>
        <button class="quick-filter-chip" type="button" data-quick-filter="aguardando">Aguardando aprovação</button>
        <button class="quick-filter-chip" type="button" data-quick-filter="atrasadas">Atrasadas</button>
        <button class="quick-filter-chip" type="button" data-quick-filter="pendencia">Com pendência</button>
        <button class="quick-filter-chip" type="button" data-quick-filter="entregues">Entregues</button>
        <button class="quick-filter-chip" type="button" data-quick-filter="sem-cobranca">Sem cobrança</button>
      </div>
      <p class="results-count" id="ordersResultCount" aria-live="polite">0 ordens encontradas</p>
    </section>

    <section id="ordersList" class="orders-grid"></section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/os.js"></script>
</body>
</html>
